---
- name: Bootstrap LXC container for Ansible user creation
  hosts: frigate-basilisk
  gather_facts: false
  become: true
  vars:
    ansible_user: root 

  pre_tasks:
    - name: 1/7] - [Remove old SSH host key from local known_hosts
      delegate_to: localhost
      become: false # Runs as your local user, not root
      ansible.builtin.command:
        cmd: "ssh-keygen -R {{ inventory_hostname }}"
      failed_when: false # Ignore errors if the IP isn't in known_hosts yet

  tasks:
    - name: 2/7] - [Ensure sudo is installed
      ansible.builtin.package:
        name: sudo
        state: present

    - name: 3/7] - [Update apt cache and upgrade installed packages
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: 4/7] - [Create the ansible user
      ansible.builtin.user:
        name: ansible
        shell: /bin/bash
        groups: sudo
        append: true

    - name: 5/7] - [Deploy SSH Key for the ansible user
      ansible.posix.authorized_key:
        user: ansible
        state: present
        key: "{{ lookup('file', '~/.ssh/ansible_basilisk.pub') }}"

    - name: 6/7] - [Allow ansible user passwordless sudo
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/ansible
        line: "ansible ALL=(ALL) NOPASSWD:ALL"
        validate: '/usr/sbin/visudo -cf %s'
        create: true
        mode: '0440'

    - name: 7/7] - [Secure SSH - Disable root login entirely
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart ssh

  handlers:
    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
